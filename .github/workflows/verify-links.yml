name: Verify Links

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v1.8.0
        with:
          args: --verbose --no-progress './README*.md' './CONTRIBUTING.md'
          fail: true
